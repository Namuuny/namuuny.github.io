<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart City Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-900">

  <!-- TOP NAV BAR -->
  <nav class="fixed top-0 w-full bg-white shadow-sm z-50 border-b">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      
      <!-- Logo / Title -->
      <a href="#" class="text-2xl font-semibold tracking-tight">Smart City Design</a>

      <!-- Navigation Links -->
      <div class="hidden md:flex items-center gap-8 text-lg font-medium">
        <a href="#" class="hover:text-teal-600 transition">Home</a>
        <a href="#" class="hover:text-teal-600 transition">Courses</a>
        <a href="#" class="hover:text-teal-600 transition">Toolkits</a>
        <a href="#" class="hover:text-teal-600 transition">Consultation</a>
      </div>

      <!-- Language Selector + Contact -->
      <div class="flex items-center gap-6">
        <!-- Language -->
        <div class="flex items-center gap-1 border border-gray-300 rounded-full px-3 py-1 text-sm cursor-pointer hover:bg-gray-50">
          <span class="font-medium">🌐</span>
          <span>EN</span>
          <span class="text-gray-400">|</span>
          <span class="text-gray-500">МН</span>
        </div>

        <!-- Get in touch button -->
        <a href="#contact" 
           class="bg-teal-600 text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-teal-700 transition">
          Get in touch
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO SECTION -->
  <header class="min-h-screen flex items-center pt-20 bg-gradient-to-br from-gray-50 to-white">
    <div class="max-w-5xl mx-auto px-6 text-center">
      
      <!-- Big Slogan -->
      <h1 class="text-6xl md:text-7xl lg:text-8xl font-bold leading-none tracking-tighter mb-6">
        Future starts today
      </h1>

      <!-- Subtitle -->
      <p class="max-w-3xl mx-auto text-xl md:text-2xl text-gray-600 leading-relaxed mb-12">
        Master Urban Planning and Design through expert courses, 
        professional toolkits, and personalized consultation services.
      </p>

      <!-- Two Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <a href="#courses" 
           class="bg-teal-600 hover:bg-teal-700 text-white px-10 py-4 rounded-2xl text-lg font-semibold transition w-full sm:w-auto">
          Explore Courses
        </a>
        
        <a href="#consultation" 
           class="border-2 border-teal-600 hover:bg-teal-50 text-teal-700 px-10 py-4 rounded-2xl text-lg font-semibold transition w-full sm:w-auto">
          Book Consultation
        </a>
      </div>

    </div>
  </header>

  <!-- You can continue adding more sections below this line later -->

</body>
</html>
