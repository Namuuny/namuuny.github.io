<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart City Design — Making Cities for People</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat; }
  </style>
</head>
 <div class="pt-24 pb-20 px-6">
    <div class="max-w-2xl mx-auto">
      <div class="text-center mb-16">
        <h1 class="text-5xl md:text-6xl font-semibold leading-tight">Let's discuss your project</h1>
        <p class="mt-6 text-2xl text-gray-600">
          Schedule a 45-minute consultancy call or send us a message.
        </p>
      </div>

      <!-- Scheduling + Contact Form -->
      <div class="bg-white border border-gray-100 rounded-3xl shadow-xl p-10 md:p-12">
        <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID_HERE" method="POST" class="space-y-8">

          <!-- Name -->
          <div>
            <label class="block text-sm font-medium mb-2">Your Name</label>
            <input type="text" name="name" required 
                   class="w-full px-6 py-4 border border-gray-300 rounded-2xl focus:border-teal-600 focus:outline-none text-lg">
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium mb-2">Email Address</label>
            <input type="email" name="email" required 
                   class="w-full px-6 py-4 border border-gray-300 rounded-2xl focus:border-teal-600 focus:outline-none text-lg">
          </div>

          <!-- Preferred Date -->
          <div>
            <label class="block text-sm font-medium mb-2">Preferred Date</label>
            <input type="date" name="preferred_date" required 
                   class="w-full px-6 py-4 border border-gray-300 rounded-2xl focus:border-teal-600 focus:outline-none text-lg">
          </div>

          <!-- Preferred Time -->
          <div>
            <label class="block text-sm font-medium mb-2">Preferred Time (45-minute slot)</label>
            <input type="time" name="preferred_time" required 
                   class="w-full px-6 py-4 border border-gray-300 rounded-2xl focus:border-teal-600 focus:outline-none text-lg"
                   min="09:00" max="17:00" step="1800">
          </div>

          <!-- Project Description -->
          <div>
            <label class="block text-sm font-medium mb-2">Tell us about your project</label>
            <textarea name="message" rows="5" placeholder="Describe your smart city initiative, urban challenge, or what you'd like to discuss..."
                      class="w-full px-6 py-4 border border-gray-300 rounded-2xl focus:border-teal-600 focus:outline-none text-lg"></textarea>
          </div>

          <!-- Submit -->
          <button type="submit" 
                  class="w-full bg-teal-600 hover:bg-teal-700 text-white py-5 rounded-2xl font-semibold text-xl transition">
            Send Message & Booking Request
          </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-10">
          We usually reply within 1–2 business days. All calls are held via Zoom or Google Meet.
        </p>
      </div>
    </div>
  </div>
<!-- FOOTER (same) -->
  <footer class="bg-gray-900 text-white py-12 px-6">
    <div class="max-w-7xl mx-auto text-center text-sm">
      © 2026 Smart City Design • All rights reserved
    </div>
  </footer>

</body>
</html>
